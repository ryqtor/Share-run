# ── Standalone Traefik for local development ──
# Run: docker compose up -d
#
# Dashboard: http://localhost:8080

version: "3.8"

networks:
  sharerun-network:
    external: true

services:
  traefik:
    image: traefik:v3.0
    container_name: sharerun-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--entrypoints.web.address=:80"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=sharerun-network"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sharerun-network
